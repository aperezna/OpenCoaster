schema: spec-driven

project:
  name: OpenCoaster
  lifecycle: greenfield-mvp
  persistence: hybrid

workflow:
  execution_mode: auto
  chained_pr_strategy: auto-forecast
  review_budget_lines: 800

context: |
  Expo + React Native + TypeScript Android MVP (Expo 52, RN 0.76).
  Navigation: React Navigation (native-stack + bottom-tabs).
  Data: TanStack Query v5 + in-memory StorageAdapter.
  Maps: react-native-maps (OSM UrlTile via WebView).
  Location: expo-location with LocationService interface + test double.
  Architecture: feature-first under src/features/, shared data layer under src/data/.
  One SDD change completed (mvp-discovery-foundation, archived).
  No secrets in source; use local env vars only.

testing:
  strict_tdd: true
  source: detected from runner existence (Jest configured with 128 tests, 127 passing)
  detected: 2026-07-12
  runner:
    available: true
    framework: Jest + jest-expo + @testing-library/react-native
    rationale: Jest with ts-jest and jest-expo preset for Expo native mocking compatibility. 128 tests (127 passing, 1 known failure in ParksListScreen debounce).
    commands:
      test: npx jest --passWithNoTests
      watch: npx jest --watch
      coverage: npx jest --coverage
  layers:
    unit:
      available: true
      tool: Jest
    integration:
      available: true
      tool: '@testing-library/react-native'
    e2e:
      available: true
      tool: Maestro (3 flows: launch, park-detail, search)
  quality:
    linter:
      available: true
      command: npx eslint .
    type_checker:
      available: true
      command: npx tsc --noEmit
    formatter:
      available: true
      command: npx prettier . --check

rules:
  proposal:
    - State Android MVP scope, rollout assumptions, and rollback path for risky changes.
  specs:
    - Use Given/When/Then scenarios.
    - Use RFC 2119 keywords (MUST, SHOULD, MAY).
  design:
    - Record architecture decisions and integration boundaries.
    - Call out offline/cache behavior and map-related constraints.
  tasks:
    - Group by phase and keep each task completable in one session.
    - Forecast PR size against the 800-line review budget.
  apply:
    - Follow Red-Green-Refactor once the test toolchain is bootstrapped.
    - Keep secrets out of source control and use local env files only.
    tdd: true
    test_command: npx jest
  verify:
    test_command: npx jest --coverage
    build_command: ''
    coverage_threshold: 0
  archive:
    - Preserve archived changes as an audit trail.

